services:
  - type: web
    name: scott-hosted-tools
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /data
    disk:
      name: app-data
      mountPath: /data
      sizeGB: 5
